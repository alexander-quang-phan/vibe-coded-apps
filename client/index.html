<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1116" />
    <meta name="description" content="Trim your spending. Grow your savings." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Trim — Trim your spending. Grow your savings.</title>
    <script>
      // Respect persisted preference; otherwise dark-mode default (already set above).
      (function () {
        try {
          var t = localStorage.getItem('trim-theme');
          if (t === 'light') document.documentElement.classList.remove('dark');
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
